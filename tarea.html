<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
body {
font-family: Arial, sans-serif;
background-color: #f0f0f0;
margin: 0;
padding: 20px;
display: flex;
justify-content: center;
}

.contenedor-principal {
width: 800px;
background-color: white;
border: 1px solid #ccc;
min-height: 500px;
}

.encabezado {
display: flex;
justify-content: space-between;
align-items: center;
padding: 15px 20px;
border-bottom: 1px solid #ccc;
}

.logo-empresa {
display: flex;
align-items: center;
gap: 15px;
}

.logo {
border: 1px solid #000;
padding: 10px 15px;
font-size: 14px;
}

.cerrar-sesion {
text-decoration: none;
color: black;
font-size: 14px;
}

.contenido {
padding: 30px;
}

.barra-superior {
display: flex;
justify-content: space-between;
align-items: center;
width: 550px;
margin-bottom: 10px;
}

.boton-agregar {
border: 1px solid #000;
background-color: transparent;
padding: 5px 20px;
border-radius: 5px;
cursor: pointer;
}

.tabla-productos {
border-collapse: collapse;
width: 550px;
}

.tabla-productos th, 
.tabla-productos td {
border: 1px solid #000;
height: 25px;
text-align: center;
font-size: 14px;
font-weight: normal;
}

.tabla-productos th.columna-acciones, 
.tabla-productos td.acciones {
border: none;
text-align: left;
padding-left: 15px;
}

.acciones a {
text-decoration: none;
color: black;
margin-right: 10px;
}
</style>

</head>
<body>
<div class="contenedor-principal">

<header class="encabezado">
<div class="logo-empresa">
<div class="logo">Logo</div>
<span>Empresa Acme</span>
</div>
<a href="#" class="cerrar-sesion">Cerrar sesión</a>
</header>

<main class="contenido">

<div class="barra-superior">
<span>Productos</span>
<button class="boton-agregar">Agregar</button>
</div>

<table class="tabla-productos">
<thead>
<tr>
<th>Codigo</th>
<th>Nombre</th>
<th>Precio</th>
<th class="columna-acciones"></th>
</tr>
</thead>
<tbody>
<tr>
<td></td>
<td></td>
<td></td>
<td class="acciones">
<a href="#">Editar</a>
<a href="#">Borrar</a>
</td>
</tr>
<tr>
<td></td>
<td></td>
<td></td>
<td class="acciones">
<a href="#">Editar</a>
<a href="#">Borrar</a>
</td>
</tr>
<tr>
<td></td>
<td></td>
<td></td>
<td class="acciones">
<a href="#">Editar</a>
<a href="#">Borrar</a>
</td>
</tr>
</tbody>
</table>

</main>

</div>
</body>
</html>
