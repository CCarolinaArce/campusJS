<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container">

    <h1>Gestor de Contactos</h1>

    <div class="card">

      <h2>Agregar / Editar Contacto</h2>

      <form>

        <input type="text" placeholder="Nombre">

        <input type="text" placeholder="Teléfono">

        <input class="form-full" type="text" placeholder="Dirección">

        <input class="form-full" type="text" placeholder="URL de la imagen">

        <div class="form-full preview">
          <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </div>

        <div class="buttons">
          <button class="btn-primary">Guardar</button>
          <button type="reset" class="btn-secondary">Limpiar</button>
        </div>

      </form>

    </div>

    <tr>
        <td><img class="contact-img" src="https://i.pravatar.cc/101"></td>
        <td>Ana Gómez</td>
        <td>3019876543</td>
        <td>Carrera 5 #12</td>
        <td class="actions">
          <button class="btn-edit">Editar</button>
          <button class="btn-delete">Eliminar</button>
        </td>
      </tr>

    </tbody>

  </table>

</div>

</div>

</body>

</html>
